
<!-- https://github.com/DenverCoder1/readme-typing-svg/ -->
<svg xmlns='http://www.w3.org/2000/svg'
    xmlns:xlink='http://www.w3.org/1999/xlink'
    viewBox='0 0 600 80'
    style='background-color: #00000000;'
    width='600px' height='80px'>

    <style>
@font-face {
  font-family: 'Orbitron';
  font-style: normal;
  font-weight: 400;
  font-display: fallback;
  src: url(data:font/truetype;base64,) format('truetype');
}
</style>

                <path id='path0'>
                            <!-- Single line -->
                                <animate id='d0' attributeName='d' begin='0s;d1.end'
                    dur='4000ms' fill='remove'
                    values='m0,40 h0 ; m0,40 h600 ; m0,40 h600 ; m0,40 h0' keyTimes='0;0.6;0.85;1' />
                    </path>
    <text font-family='"Orbitron", monospace' fill='#FF6EC7ee' font-size='24'
        dominant-baseline='middle'
        x='0%' text-anchor='start'
        letter-spacing='normal'>
        <textPath xlink:href='#path0'>
            LET&#039;S BUILD SOMETHING AMAZING!
        </textPath>
    </text>
        <path id='path1'>
                            <!-- Single line -->
                                <animate id='d1' attributeName='d' begin='d0.end'
                    dur='4000ms' fill='remove'
                    values='m0,40 h0 ; m0,40 h600 ; m0,40 h600 ; m0,40 h0' keyTimes='0;0.6;0.85;1' />
                    </path>
    <text font-family='"Orbitron", monospace' fill='#FF6EC7ee' font-size='24'
        dominant-baseline='middle'
        x='0%' text-anchor='start'
        letter-spacing='normal'>
        <textPath xlink:href='#path1'>
            CONNECT 
        </textPath>
    </text>
</svg>
