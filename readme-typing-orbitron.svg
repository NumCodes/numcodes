
<!-- https://github.com/DenverCoder1/readme-typing-svg/ -->
<svg xmlns='http://www.w3.org/2000/svg'
    xmlns:xlink='http://www.w3.org/1999/xlink'
    viewBox='0 0 700 60'
    style='background-color: #00000000;'
    width='700px' height='60px'>

    <style>
@font-face {
  font-family: 'Orbitron';
  font-style: normal;
  font-weight: 400;
  font-display: fallback;
  src: url(data:font/truetype;base64,) format('truetype');
}
</style>

                <path id='path0'>
                            <!-- Multiline -->
                                <animate id='d0' attributeName='d' begin='0s;d1.end'
                    dur='6000ms' fill="freeze"
                    values='m0,21 h0 ; m0,21 h0 ; m0,21 h700 ; m0,21 h700' keyTimes='0;0;0.66666666666667;1' />
                    </path>
    <text font-family='"Orbitron", monospace' fill='#00D4AAee' font-size='16'
        dominant-baseline='middle'
        x='0%' text-anchor='start'
        letter-spacing='normal'>
        <textPath xlink:href='#path0'>
            💡 Got an exciting project%3F Let&#039;s discuss!
        </textPath>
    </text>
        <path id='path1'>
                            <!-- Multiline -->
                                <animate id='d1' attributeName='d' begin='0s;d1.end'
                    dur='12000ms' fill="freeze"
                    values='m0,42 h0 ; m0,42 h0 ; m0,42 h700 ; m0,42 h700' keyTimes='0;0.5;0.83333333333333;1' />
                    </path>
    <text font-family='"Orbitron", monospace' fill='#00D4AAee' font-size='16'
        dominant-baseline='middle'
        x='0%' text-anchor='start'
        letter-spacing='normal'>
        <textPath xlink:href='#path1'>
            🚀 Available for freelance 
        </textPath>
    </text>
</svg>
